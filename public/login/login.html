<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КТО — Вход</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #0f172a; color: #e2e8f0; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; }
    .card { background: #1e293b; border-radius: 16px; padding: 36px 32px;
            width: 100%; max-width: 360px; border: 1px solid rgba(255,255,255,0.08); }
    .logo { font-size: 22px; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
    .sub  { font-size: 13px; color: #64748b; margin-bottom: 28px; }
    .field { margin-bottom: 16px; }
    .field label { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 5px;
                   text-transform: uppercase; letter-spacing: 0.4px; }
    .field input { width: 100%; background: #0f172a; border: 1px solid rgba(255,255,255,0.1);
                   border-radius: 8px; padding: 10px 12px; font-size: 14px; color: #e2e8f0;
                   outline: none; transition: border-color 0.15s; }
    .field input:focus { border-color: #3b82f6; }
    .btn { width: 100%; background: #3b82f6; color: white; border: none;
           border-radius: 8px; padding: 12px; font-size: 14px; font-weight: 500;
           cursor: pointer; margin-top: 8px; transition: background 0.15s; }
    .btn:hover { background: #2563eb; }
    .btn:disabled { background: #334155; color: #64748b; cursor: default; }
    .error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2);
             color: #f87171; border-radius: 8px; padding: 10px 12px; font-size: 12px;
             margin-bottom: 16px; display: none; }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">КТО</div>
    <div class="sub">Панель администратора</div>
    <div class="error" id="error"></div>
    <div class="field">
      <label>Логин</label>
      <input type="text" id="username" placeholder="admin" autofocus>
    </div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" id="password" placeholder="••••••••"
             onkeydown="if(event.key==='Enter') login()">
    </div>
    <button class="btn" id="btn" onclick="login()">Войти</button>
  </div>

  <script>
    const API = '/api';

    // Если уже залогинен — сразу на главную
    if (localStorage.getItem('kto_token')) {
      window.location.href = '/admin';
    }

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('btn');
      const errEl    = document.getElementById('error');

      if (!username || !password) {
        showError('Введите логин и пароль');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Входим...';
      errEl.classList.remove('show');

      try {
        const res  = await fetch(`${API}/auth/login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('kto_token', data.token);
          localStorage.setItem('kto_admin', data.username);
          window.location.href = '/admin';
        } else {
          showError(data.error || 'Неверный логин или пароль');
        }
      } catch (e) {
        showError('Ошибка подключения к серверу');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Войти';
      }
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.classList.add('show');
    }
  </script>
</body>
</html>
